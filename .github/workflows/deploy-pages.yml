name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_pages: ${{ steps.classify.outputs.deploy_pages }}
    steps:
      - name: Ensure stable Pages release tag
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          echo "deploy_pages=false" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Manual Pages deployment."
            echo "deploy_pages=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping Pages deploy for non-stable release tag: ${tag}"
            exit 0
          fi

          echo "deploy_pages=true" >> "${GITHUB_OUTPUT}"

  build:
    needs: preflight
    if: needs.preflight.outputs.deploy_pages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
