[table.proxy_nodes]
domain = "proxy_nodes"
order = 10
primary_key = ["id"]

[[table.proxy_nodes.columns]]
name = "id"
type = "text_id"
length = 64

[[table.proxy_nodes.columns]]
name = "name"
type = "text"
length = 255

[[table.proxy_nodes.columns]]
name = "ip"
type = "text"
length = 512

[[table.proxy_nodes.columns]]
name = "port"
type = "int32"

[[table.proxy_nodes.columns]]
name = "region"
type = "text"
length = 100
nullable = true

[[table.proxy_nodes.columns]]
name = "status"
type = "text"
length = 32
default = "online"

[[table.proxy_nodes.columns]]
name = "registered_by"
type = "text_id"
length = 64
nullable = true

[[table.proxy_nodes.columns]]
name = "last_heartbeat_at"
type = "unix_seconds"
nullable = true

[[table.proxy_nodes.columns]]
name = "heartbeat_interval"
type = "int32"
default = 30

[[table.proxy_nodes.columns]]
name = "active_connections"
type = "int32"
default = 0

[[table.proxy_nodes.columns]]
name = "total_requests"
type = "int64"
