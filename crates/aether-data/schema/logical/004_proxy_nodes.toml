[[table.proxy_nodes.columns]]
name = "proxy_url"
type = "text"
length = 500
nullable = true

[[table.proxy_nodes.columns]]
name = "proxy_username"
type = "text"
length = 255
nullable = true

[[table.proxy_nodes.columns]]
name = "proxy_password"
type = "text"
length = 500
nullable = true

[[table.proxy_nodes.columns]]
name = "created_at"
type = "unix_seconds"

[[table.proxy_nodes.columns]]
name = "updated_at"
type = "unix_seconds"

[[table.proxy_nodes.columns]]
name = "remote_config"
type = "json"
nullable = true

[[table.proxy_nodes.columns]]
name = "config_version"
type = "int32"
default = 0

[[table.proxy_nodes.columns]]
name = "hardware_info"
type = "json"
nullable = true

[[table.proxy_nodes.columns]]
name = "estimated_max_concurrency"
type = "int32"
nullable = true

[[table.proxy_nodes.columns]]
name = "tunnel_mode"
type = "bool"
