[[table.proxy_nodes.columns]]
name = "tunnel_connected"
type = "bool"
default = false

[[table.proxy_nodes.columns]]
name = "tunnel_connected_at"
type = "unix_seconds"
nullable = true

[[table.proxy_nodes.columns]]
name = "failed_requests"
type = "int64"
default = 0

[[table.proxy_nodes.columns]]
name = "dns_failures"
type = "int64"
default = 0

[[table.proxy_nodes.columns]]
name = "stream_errors"
type = "int64"
default = 0

[[table.proxy_nodes.columns]]
name = "proxy_metadata"
type = "json"
nullable = true

[table.proxy_node_events]
domain = "proxy_nodes"
order = 20
