[[table.proxy_node_events.columns]]
name = "id"
type = "int64"
auto_increment = true

[[table.proxy_node_events.columns]]
name = "node_id"
type = "text_id"
length = 64

[[table.proxy_node_events.columns]]
name = "event_type"
type = "text"
length = 64

[[table.proxy_node_events.columns]]
name = "detail"
type = "text"
length = 500
nullable = true

[[table.proxy_node_events.columns]]
name = "created_at"
type = "unix_seconds"
